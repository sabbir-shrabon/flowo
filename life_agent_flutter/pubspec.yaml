name: life_agent_flutter
description: "Life Agent — AI Adaptive Planning mobile app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Auth & Backend
  supabase_flutter: ^2.8.0
  google_sign_in: ^6.2.2

  # HTTP client
  dio: ^5.8.0

  # Routing
  go_router: ^14.8.0

  # State management
  flutter_riverpod: ^2.6.0

  # Fonts
  google_fonts: ^6.2.0

  # Date formatting
  intl: ^0.20.2

  # ── Offline-first cache layer ───────────────────────────────────────────────
  # Local key-value store (uses IndexedDB on web automatically)
  hive_flutter: ^1.1.0
  # Detect network connectivity changes
  connectivity_plus: ^6.1.0
  # Android background sync (WorkManager wrapper)
  workmanager: ^0.9.0
  # File-system path for Hive on desktop/mobile
  path_provider: ^2.1.4


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

