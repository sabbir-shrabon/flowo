workflows:
  web-build:
    name: Flutter Web Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      groups:
        - environment_variables
    scripts:
      - name: Get Flutter packages
        script: |
          cd $CM_BUILD_DIR/life_agent_flutter
          flutter packages pub get
      - name: Build Web
        script: |
          cd $CM_BUILD_DIR/life_agent_flutter
          flutter build web --release \
            --dart-define=API_BASE_URL=${API_BASE_URL:-https://your-render-app.onrender.com} \
            --dart-define=SUPABASE_URL=${SUPABASE_URL:-https://evczsuziidwzlxjokkeb.supabase.co} \
            --dart-define=SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    artifacts:
      - life_agent_flutter/build/web/**
    publishing:
      codemagic_static_pages:
        subdomain: flowo-app

  android-build:
    name: Flutter Android APK Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      groups:
        - environment_variables
    scripts:
      - name: Get Flutter packages
        script: |
          cd $CM_BUILD_DIR/life_agent_flutter
          flutter packages pub get
      - name: Build Android Release APK
        script: |
          cd $CM_BUILD_DIR/life_agent_flutter
          flutter build apk --release \
            --dart-define=API_BASE_URL=${API_BASE_URL:-https://your-render-app.onrender.com} \
            --dart-define=SUPABASE_URL=${SUPABASE_URL:-https://evczsuziidwzlxjokkeb.supabase.co} \
            --dart-define=SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    artifacts:
      - life_agent_flutter/build/app/outputs/flutter-apk/*.apk
