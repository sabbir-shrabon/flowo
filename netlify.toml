[build]
  base = "life_agent_flutter"
  publish = "build/web"
  command = """
    if [ ! -d "flutter" ]; then \
      git clone https://github.com/flutter/flutter.git -b stable --depth 1; \
    fi && \
    flutter/bin/flutter pub get && \
    flutter/bin/flutter build web --release
  """

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200