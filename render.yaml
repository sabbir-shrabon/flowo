services:
  - type: web
    name: life-agent-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: >-
      sh -c 'for var in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY SUPABASE_JWT_SECRET SUPABASE_ANON_KEY; do [ -n "$(eval echo \$$var)" ] || { echo "Missing required env var: $var"; exit 1; }; done'
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /api/health
    healthCheckInterval: 300
    autoDeploy: true
    restartPolicy: on-failure
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: UV_LINK_MODE
        value: copy
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        value: https://([a-z0-9-]+\.)*(codemagic\.app|netlify\.app|vercel\.app)(:\d+)?$|http://localhost(:\d+)?$|http://127\.0\.0\.1(:\d+)?$
